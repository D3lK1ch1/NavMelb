name: Bug Report
description: Report a crash, error, or unexpected behaviour
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "e.g. App crashed when tapping the route button"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Open the app
        2. Search for a station
        3. Tap 'Get Route'
        4. App crashes
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      placeholder: "e.g. A route should have been displayed on the map"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      placeholder: "e.g. The app crashed with a white screen"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
        - Both
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS Version
      placeholder: "e.g. Android 14, iOS 17.4"

  - type: input
    id: app_version
    attributes:
      label: App Version / Branch
      placeholder: "e.g. main, v0.2-beta"

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or Logs
      description: Paste any console errors or attach screenshots here.
